services:
  iam-service:
    build:
      context: ./services/iam-service
    volumes:
      - ./services/iam-service:/var/www/html
    networks:
      - lms-network

  course-service:
    build:
      context: ./services/course-service
    volumes:
      - ./services/course-service:/var/www/html
    networks:
      - lms-network

  nginx-gateway:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./services/iam-service:/var/www/html
      - ./infrastructure/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - iam-service
      - keycloak
    networks:
      - lms-network
  
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./infrastructure/postgres/data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init-schema.sql:/docker-entrypoint-initdb.d/init-schema.sql
    networks:
      - lms-network
  
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    networks:
      - lms-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - lms-network

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://db:5432/${POSTGRES_DB}
      KC_DB_USERNAME: ${POSTGRES_USER}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KC_HOSTNAME: localhost
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_HTTP_ENABLED: true
      KC_PROXY_HEADERS: xforwarded
    ports:
      - "8082:8080"
    depends_on:
      - db
    networks:
      - lms-network
  
networks:
  lms-network:
    driver: bridge