services:
  php:
    build:
      context: .
    volumes:
      - .:/var/www/html
    networks:
      - lms-network
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - lms-network
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    networks:
      - lms-network
    volumes:
      - ./docker/db/data:/var/lib/postgresql/data
networks:
  lms-network:
    driver: bridge