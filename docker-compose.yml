version: '3.8'

services:
  iam-service:
    build:
      context: ./services/iam-service
    volumes:
      - ./services/iam-service:/var/www/html/iam
      - ./infrastructure/jwt:/var/www/html/iam/config/jwt:ro
    networks:
      - lms-network
  
  course-service:
    build:
      context: ./services/course-service
    volumes:
      - ./services/course-service:/var/www/html/course
      - ./infrastructure/jwt:/var/www/html/course/config/jwt:ro
    networks:
      - lms-network

  nginx-gateway:
    image: nginx:alpine
    container_name: lms-nginx-gateway
    ports:
      - "8080:80"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - iam-service
      - keycloak
      - course-service
    networks:
     - lms-network

  db:
    image: postgres:15-alpine
    container_name: lms-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./infrastructure/postgres/data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init-schema.sql:/docker-entrypoint-initdb.d/init-schema.sql
    networks:
      - lms-network
  
  redis:
    image: redis:alpine
    container_name: lms-redis
    ports:
      - "6379:6379"
    networks:
      - lms-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: lms-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - lms-network

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: lms-keycloak
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://db:5432/${POSTGRES_DB}
      KC_DB_USERNAME: ${POSTGRES_USER}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KC_HOSTNAME: localhost
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_HTTP_ENABLED: true
      KC_PROXY_HEADERS: xforwarded
    ports:
      - "8082:8080"
    depends_on:
      - db
    networks:
      - lms-network
    
networks:
  lms-network:
    driver: bridge